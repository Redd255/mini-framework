<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoMVC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section id="app" class="todoapp">
        <header class="header">
            <h1>todos</h1>
            <input class="new-todo" placeholder="What needs to be done?" autofocus data-onkeydown="addTodo">
        </header>
        <section class="main" id="main" style="display: none;">
            <input id="toggle-all" class="toggle-all" type="checkbox" data-onclick="toggleAll">
            <label for="toggle-all">Mark all as complete</label>
            <ul class="todo-list" id="todo-list">
            </ul>
        </section>
        <footer class="footer" id="footer" style="display: none;">
            <span class="todo-count" id="todo-count"></span>
            <ul class="filters">
                <li>
                    <a href="#/" class="selected" data-onclick="setFilter" data-filter="all">All</a>
                </li>
                <li>
                    <a href="#/active" data-onclick="setFilter" data-filter="active">Active</a>
                </li>
                <li>
                    <a href="#/completed" data-onclick="setFilter" data-filter="completed">Completed</a>
                </li>
            </ul>
            <button class="clear-completed" data-onclick="clearCompleted" style="display: none;">Clear completed</button>
        </footer>
    </section>
    <footer class="info">
        <p>Double-click to edit a todo</p>
        <p>Created by <a href="http://github.com/petehunt/">petehunt</a></p>
        <p>Part of <a href="http://todomvc.com">TodoMVC</a></p>
    </footer>

    <!-- Framework files -->
    <script src="framework/vdom.js"></script>
    <script src="framework/VDOMmanager.js"></script>
    <script src="framework/eventhandler.js"></script>
    <script src="framework/router.js"></script>
    
    <!-- Application -->
    <script src="app.js"></script>
</body>
</html>
